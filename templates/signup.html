<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
          crossorigin="anonymous">
    <title>Sign Up</title>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand">Nittany Auction</a>

            <div class="ml-auto">
                <a href="/login" class="btn btn-primary mr-2">Login</a>
                <a href="/signup" class="btn btn-outline-secondary">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5 pb-5 text-center d-flex align-items-center" style="max-width: 70%; min-height: 80vh;">
        <div class="row align-items-start w-100">

            <!-- Daniel : I removed the image because I think it looks better without it -->
            <!-- <div class="col-md-6 text-center d-none d-md-block">
                <img src="{{ url_for('static', filename='images/login.svg') }}"
                     class="img-fluid" alt="Sign-up illustration" style="max-width: 110%;">
            </div> -->

            <div class="col-md-6 text-md-left text-center">
                <h1 class="display-4 mb-4">Sign Up</h1>

                <form method="post" action="{{ url_for('signup') }}">

                    <div class="form-group text-left">
                        <label>Email</label>
                        <input type="email"
                               class="form-control"
                               name="email"
                               placeholder="username@example.com"
                               required>
                    </div>

                    <div class="form-group text-left">
                        <label>Password</label>
                        <input type="password"
                               class="form-control"
                               name="password"
                               placeholder="Choose a password"
                               required>
                    </div>

                    <div class="form-group text-left">
                        <label>Full name or business name</label>
                        <input type="text"
                               class="form-control"
                               name="name"
                               placeholder="Danish Afiq OR Panera Bread"
                               required>
                    </div>

                    <div class="form-group col-md-6">
                        <label>Age</label>
                        <input type="number"
                               class="form-control"
                               name="age" min="16"
                               placeholder="Age" required>
                    </div>

                    <div class="form-group col-md-6">
                        <label>Major</label>
                        <input type="text"
                               class="form-control"
                               name="major"
                               placeholder="Computer Science">
                    </div>


                    <div class="form-group text-left">
                        <label>Street Number</label>
                        <input type="text"
                               class="form-control"
                               name="street_num"
                               placeholder="123">
                    </div>

                    <div class="form-group text-left">
                        <label>Street Address</label>
                        <input type="text"
                               class="form-control"
                               name="street_name"
                               placeholder="College Ave">
                    </div>

                    <div class="form-row">
                        <div class="form-group col-md-6 text-left">
                            <label>City</label>
                            <input type="text"
                                   class="form-control"
                                   name="city"
                                   placeholder="City">
                        </div>

                        <div class="form-group col-md-3 text-left">
                            <label>State</label>
                            <input type="text"
                                   class="form-control"
                                   name="state"
                                   placeholder="PA">
                        </div>

                        <div class="form-group col-md-3 text-left">
                            <label>ZIP code</label>
                            <input type="text"
                                   class="form-control"
                                   name="zipcode"
                                   placeholder="16801" inputmode="numeric" maxlength="10">
                        </div>
                    </div>

                    <button type="submit"
                            class="btn btn-primary btn-lg btn-block mt-2">
                        Create account
                    </button>

                    <p class="mt-3 mb-0">
                        Already have an account?
                        <a href="/login">Sign in</a>
                    </p>

                </form>
            </div>
        </div>
    </div>
</body>
</html>
