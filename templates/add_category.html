{% extends 'layout.html' %}

{% block title %} Add Category {% endblock %}

{% block content %}
<!-- MAIN -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
            <!-- Adding New Category-->
                <div class="card-body p-4">
                    <h2 class="mb-3">Add New Category</h2>
                    <p class="text-muted">
                        Create a category in the product hierarchy.
                    </p>
                    <form method="POST" action="{{ url_for('add_category') }}">
                        <!-- CATEGORY NAME -->
                        <div class="form-group">
                            <label for="category_name">Category Name</label>
                            <input type="text" class="form-control" id="category_name" name="category_name" placeholder="Enter category name"  required>
                        </div>
                        <!-- PARENT CATEGORY -->
                        <div class="form-group">
                            <label for="parent_category">Parent Category</label>
                            <select class="form-control" id="parent_category" name="parent_category">
                                <option value="">None (Top Level Category) </option>
                                {% for c in categories %}
                                <option value="{{ c['category_name'] }}">
                                    {{ c['category_name'] }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <!-- SUBMIT -->
                        <button type="submit" class="btn btn-success btn-block">Add Category</button>
                    </form>
                    <a href="{{ url_for('helpdesk_dashboard') }}" class="btn btn-link btn-block mt-3">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
