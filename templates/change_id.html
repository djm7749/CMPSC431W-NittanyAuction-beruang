<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change ID</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">

    <a class="navbar-brand font-weight-bold" href="/">
        NITTANY AUCTION
    </a>

    <div class="ml-auto">

        <a href="{{ url_for('helpdesk_dashboard') }}"
           class="btn btn-outline-primary mr-2">

           HelpDesk Dashboard

        </a>

        <a href="{{ url_for('logout') }}"
           class="btn btn-outline-secondary">

           Logout

        </a>

    </div>

</nav>

<!-- MAIN -->
<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-sm">

                <div class="card-body p-4">

                    <h2 class="mb-3">
                        Change User ID
                    </h2>

                    <p class="text-muted">
                        Process request #{{ req.request_id }}
                    </p>

                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST"
                          action="{{ url_for('change_user_id',
                                             request_id=req.request_id) }}">

                        <!-- OLD EMAIL -->
                        <div class="form-group">

                            <label>
                                Current User ID
                            </label>

                            <input type="email"
                                   class="form-control"
                                   name="old_email"
                                   value="{{ req.sender_email }}"
                                   required>

                        </div>

                        <!-- NEW EMAIL -->
                        <div class="form-group">

                            <label>
                                New User ID
                            </label>

                            <input type="email"
                                   class="form-control"
                                   name="new_email"
                                   placeholder="Enter new email"
                                   required>

                        </div>

                        <!-- REQUEST INFO -->
                        <div class="form-group">

                            <label>
                                Request Description
                            </label>

                            <textarea class="form-control"
                                      rows="4"
                                      readonly>{{ req.request_desc }}</textarea>

                        </div>

                        <!-- SUBMIT -->
                        <button type="submit"
                                class="btn btn-success btn-block">

                            Approve Change ID

                        </button>

                    </form>

                    <a href="{{ url_for('helpdesk_dashboard') }}"
                       class="btn btn-link btn-block mt-3">

                       Cancel

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
