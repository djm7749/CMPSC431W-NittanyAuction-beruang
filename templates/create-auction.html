{% extends 'layout.html' %}

{% block title %} Create Auction Listings {% endblock %}

{% block content %}

    <!-- MAIN CONTENT -->
    <div class="container mt-4 bg-light p-4 rounded">
        <h2>Create Auction</h2>
        <p>Here you can create a new auction.</p>

        <!-- CREATE AUCTION FORM -->
        <form method="POST" action="/seller_dashboard/create_auction" enctype="multipart/form-data">
            <div class="form-group text-left">
                <label for="auction_title">Auction Title</label>
                <input type="text" class="form-control" id="auction_title" name="auction_title" placeholder="Enter auction title" required>
            </div>
            <div class="row">

                <div class="col-md-6">
                    <div class="form-group text-left">
                        <label for="name">Item Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Enter item name" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group text-left">
                        <label for="category">Category</label>
                        <select class="form-control" id="category" name="category" required>
                            <option value="">Select a category</option>
                            {% for category in categories %}
                                <option value="{{ category.name }}">
                                    {{ category.display_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

            </div>

            <div class="row">
                <div class="col-md-12">
                    <div class="form-group text-left">
                        <label for="description">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Enter item description or condition" required></textarea>
                    </div>
                </div>
            </div>

            <div class="row mt-3">

                <div class="col-md-4">
                    <div class="form-group text-left">
                        <label for="reserve_price">Reserve Price</label>
                        <input type="number" step="0.01" class="form-control" id="reserve_price" name="reserve_price" placeholder="Enter starting price" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-group text-left">
                        <label for="quantity">Quantity</label>
                        <input type="number" class="form-control" id="quantity" name="quantity" min="1" placeholder="Enter quantity" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-group text-left">
                        <label for="max_bids">Max Bids</label>
                        <input type="number" class="form-control" id="max_bids" name="max_bids" min="1" placeholder="Enter maximum number of bids" required>
                    </div>
                </div>
            </div>

            <div class="form-group text-left">
                <label for="image">Image</label>
                <input type="file" class="form-control-file" id="image" name="image">
            </div>
            <button type="submit" class="btn btn-primary">Create Auction</button>
        </form>
    </div>

{% endblock %}
