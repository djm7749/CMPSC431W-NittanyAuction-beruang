{% extends 'layout.html' %}

{% block title %} Bidder Dashboard {% endblock %}

{% block content %}

    <!-- MAIN CONTENT -->
    <!-- <div class="container mt-4">
        <h1>Bidder Dashboard</h1>
        <p>Welcome to your bidder dashboard!</p>
    </div> -->

    <div class="container mt-4 bg-light p-4 rounded">
        <h2>Current Bids</h2>
        <!-- <p>Here you can see all your current bids.</p> -->

        <div class="row justify-content-start mt-3">
            {% for item in items %}
            <div class="col-md-4 mb-4 d-flex">
                
                <div class="card auction-card">
                    <div class="card-body d-flex flex-column">

                        <h5 class="card-title mb-3">{{ item.name }}</h5>

                        <div class="card-desc-section">
                            <p class="card-text mb-1">Current Bid: ${{ item.price }}</p>
                            <p class="card-text mb-1">Highest Bidder: {{ item.highest_bidder }}</p>
                            <p class="card-text mb-1">Status: {{ item.status }}</p>
                        </div>

                        <a href="#" class="btn btn-primary mt-auto">View Details</a>

                    </div>
                </div>

            </div>
            {% endfor %}
        </div>
    </div>


{% endblock %}
